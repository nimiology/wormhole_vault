version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: backup_redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backup_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - ./backups:/app/backups
      - ./ssh_keys:/app/ssh_keys:ro
    ports:
      - "8585:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backup_worker
    command: celery -A config worker -l INFO --concurrency=2
    volumes:
      - .:/app
      - ./backups:/app/backups
      - ./ssh_keys:/app/ssh_keys:ro
    env_file:
      - .env
    depends_on:
      - redis
      - web
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backup_beat
    command: celery -A config beat -l INFO
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - web
    restart: unless-stopped

volumes:
  backup_data:
